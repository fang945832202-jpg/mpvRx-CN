name: CI/CD Build

on:
  pull_request:
  workflow_dispatch:  # 允许你手动在 Actions 页面点击按钮触发编译

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: set-short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      # 优化：改用目前主流且支持更好的 Eclipse Temurin 发行版
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      # 优化：增加 Gradle 运行时的稳定性参数，防止因下载大文件网络抖动导致 Connection refused
      - name: Set up Gradle Enterprise / Build Environment
        run: |
          mkdir -p ~/.gradle
          echo "systemProp.http.proxyHost=" >> ~/.gradle/gradle.properties
          echo "systemProp.https.proxyHost=" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.internal.http.socketTimeout=60000" >> ~/.gradle/gradle.properties
          echo "org.gradle.internal.http.connectionTimeout=60000" >> ~/.gradle/gradle.properties

      # 显式给 gradlew 赋权，并添加依赖下载重试机制
      - name: Make gradlew executable & Pre-download dependencies
        run: |
          chmod +x ./gradlew
          ./gradlew dependencies --no-daemon || ./gradlew dependencies --no-daemon || true

      # 先尝试编译 StandardDebug 版本（Debug包更不容易卡在Release的资源压缩和混淆上，且不需要签名）
      - name: Build with Gradle
        run: ./gradlew assembleStandardDebug --stacktrace --no-daemon

      # 修改产物上传路径，对应 Debug 包的生成路径
      - name: Upload app-arm64-v8a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-standard-arm64-v8a-debug-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/debug/app-standard-arm64-v8a-debug*.apk
          if-no-files-found: warn

      - name: Upload app-universal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-standard-universal-debug-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/debug/app-standard-universal-debug*.apk
          if-no-files-found: warn
